<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub MP3 Player</title>
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-purple-900 to-blue-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl p-6 border border-white/20">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">🎵 GitHub MP3 Player</h1>
            <p class="text-gray-300">Play music directly from your GitHub repository</p>
        </div>

        <!-- Player Controls -->
        <div class="bg-white/5 rounded-xl p-6 mb-6">
            <!-- Album Art / Visualizer -->
            <div class="w-48 h-48 mx-auto mb-6 rounded-lg bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center" id="albumArt">
                <i class="fa-solid fa-music text-6xl text-white/50"></i>
            </div>

            <!-- Now Playing -->
            <div class="text-center mb-4">
                <h2 class="text-xl font-semibold text-white" id="currentSong">No song selected</h2>
                <p class="text-gray-400 text-sm" id="songArtist">Select a song from the playlist</p>
            </div>

            <!-- Progress Bar -->
            <div class="mb-4">
                <div class="flex justify-between text-xs text-gray-400 mb-1">
                    <span id="currentTime">0:00</span>
                    <span id="duration">0:00</span>
                </div>
                <input type="range" id="progressBar" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer" value="0" step="0.1">
            </div>

            <!-- Control Buttons -->
            <div class="flex justify-center items-center space-x-4">
                <button id="prevBtn" class="text-white hover:text-purple-400 transition p-2">
                    <i class="fa-solid fa-backward-step text-2xl"></i>
                </button>
                <button id="playPauseBtn" class="bg-purple-600 hover:bg-purple-700 text-white rounded-full p-4 transition">
                    <i class="fa-solid fa-play text-2xl" id="playPauseIcon"></i>
                </button>
                <button id="nextBtn" class="text-white hover:text-purple-400 transition p-2">
                    <i class="fa-solid fa-forward-step text-2xl"></i>
                </button>
                <button id="shuffleBtn" class="text-gray-400 hover:text-purple-400 transition p-2">
                    <i class="fa-solid fa-shuffle text-xl"></i>
                </button>
                <button id="repeatBtn" class="text-gray-400 hover:text-purple-400 transition p-2">
                    <i class="fa-solid fa-repeat text-xl"></i>
                </button>
            </div>

            <!-- Volume Control -->
            <div class="flex items-center justify-center mt-4 space-x-2">
                <i class="fa-solid fa-volume-low text-white"></i>
                <input type="range" id="volumeControl" class="w-32 h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer" min="0" max="100" value="70">
                <i class="fa-solid fa-volume-high text-white"></i>
            </div>
        </div>

        <!-- Playlist Section -->
        <div class="bg-white/5 rounded-xl p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-white">📋 Playlist</h3>
                <button id="refreshBtn" class="text-sm bg-purple-600 hover:bg-purple-700 text-white px-3 py-1 rounded transition">
                    <i class="fa-solid fa-rotate-right mr-1"></i>Refresh
                </button>
            </div>
            
            <!-- Playlist Container -->
            <div id="playlist" class="space-y-2 max-h-64 overflow-y-auto">
                <!-- Songs will be loaded here -->
                <div class="text-center text-gray-400 py-4">
                    <i class="fa-solid fa-circle-notch fa-spin mr-2"></i>
                    Loading songs...
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 text-gray-400 text-sm">
            <p>Your music stays in your browser • No data collected • Open source</p>
        </div>
    </div>

    <!-- Audio Element -->
    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
